<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Online Zoo</title>
  </head>
  <body>
    <script>
      (function redirectSpaPath(location) {
        const isGitHubPagesHost = location.hostname.endsWith('.github.io');
        const pathSegmentsToKeep = isGitHubPagesHost ? 1 : 0;

        const pathParts = location.pathname.split('/').filter(Boolean);
        const basePath = `/${pathParts.slice(0, pathSegmentsToKeep).join('/')}`;
        const routePath = pathParts.slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~');
        const search = location.search
          ? `&${location.search.slice(1).replace(/&/g, '~and~')}`
          : '';
        const origin = `${location.protocol}//${location.hostname}${location.port ? `:${location.port}` : ''}`;
        const redirectUrl = `${origin}${basePath}/?/${routePath}${search}${location.hash}`;

        location.replace(redirectUrl);
      })(window.location);
    </script>
  </body>
</html>
